services:
  fuseki:
    image: secoresearch/fuseki:5.5.0
    environment:
      - ADMIN_PASSWORD=admin
    ports:
      - '3939:3030'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://localhost:3030/ >/dev/null 2>&1 || exit 1',
        ]
      interval: 5s
      timeout: 3s
      retries: 10
